<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Table UI</title>
  <style> body{font-family:system-ui;margin:1rem} button{margin:.25rem} .item{margin:.25rem 0} </style>
</head>
<body>
  <h1>Table UI</h1>
  <p>Table ID: <input id="tableId" value="1" size="3"/></p>
  <button id="activate">Activate Table (waiter must do this)</button>
  <h2>Menu</h2>
  <div id="menu"></div>
  <button id="newOrder">Create pending order</button>
  <div id="order"></div>
  <button id="place">Place order</button>
  <button id="cancel">Cancel order</button>

  <script>
  let orderId = null;
  async function loadMenu(){
    const res = await fetch('/api/customers/menu');
    const items = await res.json();
    const div = document.getElementById('menu');
    div.innerHTML = items.map(i=>`<div class="item">${i.name} - €${i.price.toFixed(2)} <button onclick="addItem('${i.name}',${i.price})">Add</button></div>`).join('');
  }
  async function addItem(name, price){
    if(!orderId){return alert('Create an order first');}
    await fetch(`/api/customers/orders/${orderId}/items`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, price})});
    await refreshOrder();
  }
  async function refreshOrder(){
    if(!orderId) return;
    const o = await (await fetch(`/api/customers/orders/${orderId}`)).json();
    document.getElementById('order').innerHTML = `<h3>Order #${o.id} (${o.status})</h3>` +
      o.items.map(it=>`<div>${it.name} - ${it.status} <button onclick="removeItem(${it.id})">Remove</button></div>`).join('');
  }
  async function removeItem(id){
    await fetch(`/api/customers/orders/${orderId}/items/${id}`, {method:'DELETE'});
    await refreshOrder();
  }
  document.getElementById('newOrder').onclick = async ()=>{
    const tableId = document.getElementById('tableId').value;
    const res = await fetch(`/api/customers/tables/${tableId}/orders`, {method:'POST'});
    const j = await res.json();
    orderId = j.order_id; await refreshOrder();
  };
  document.getElementById('place').onclick = async ()=>{
    if(!orderId) return;
    await fetch(`/api/customers/orders/${orderId}/place`, {method:'POST'});
    await refreshOrder();
  };
  document.getElementById('cancel').onclick = async ()=>{
    if(!orderId) return;
    await fetch(`/api/customers/orders/${orderId}`, {method:'DELETE'});
    orderId = null; document.getElementById('order').innerHTML = '';
  };
  document.getElementById('activate').onclick = async ()=>{
    const t = document.getElementById('tableId').value;
    alert('Ask waiter to log in and activate this table.');
  }
  loadMenu();
  </script>
</body>
</html>
